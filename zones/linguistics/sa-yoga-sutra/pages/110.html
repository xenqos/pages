<h1>3.4&ensp;Саньяма (Триединство)</h1>

<span class='t11'>त्रयमेकत्र संयमः</span><br>
<span class='t12'>trayám-ēkátrá saṃyamaḥ</span><br>
<span class='t13'>Эти три вместе составляют самьяму.</span><br>

<span class='t21'>त्रयम्</span><br>
<span class='t22'>tráy am</span><br>
<span class='t23'>тройка, три (дхарана, дхьяна и самадхи)</span><br>
<br>
<span class='t21'>एकत्र</span><br>
<span class='t22'>ékatra</span><br>
<span class='t23'>вместе, в одном месте, в единстве</span><br>
<br>
<span class='t21'>संयमः</span><br>
<span class='t22'>saṃyámaḥ</span><br>
<span class='t23'>саньяма, тройственный контроль (дхарана + дхьяна + самадхи)</span><br>
