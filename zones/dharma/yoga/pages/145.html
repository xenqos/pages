<h1>3.39&ensp;Левитация (Удана)</h1>

<span class='dh'>उदानजयाज्जलपङ्ककण्टकादिष्वसङ्ग उत्क्रान्तिश्च</span><br>
<span class='r'>udāná-jayāj-jalá-paṅká-kaṇṭakā́diṣv-asáṅga utkrā́ntíś-ca</span><br>
<!-- ## Перевод -->
Овладение праной «удана» дает способность не касаться воды, грязи, шипов и левитацию.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>उदान</span><br>
<span class='r'>udāná</span><br>
существительное — восходящий ток энергии.<br>
