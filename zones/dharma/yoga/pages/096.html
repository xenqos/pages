<h1>2.45 Успех в Самадхи</h1>

<span class='dh'>समाधिसिद्धिरीश्वरप्रणिधानात्</span><br>
<span class='r'>samādhí-siddhir-īśvará-praṇidhānā́t</span><br>

<h2>Перевод</h2>
Совершенство в самадхи достигается через преданность Ишваре.<br>

<h2>Слова</h2>

<span class='d'>समाधि</span><br>
<span class='r'>samādhí</span><br>
существительное — самадхи.<br>
<br>
<span class='d'>प्रणिधानात्</span><br>
<span class='r'>praṇidhānā́t</span><br>
отложительный падеж — из преданности.<br>
