<h1>3.26 Знание вселенной (Солнце)</h1>

<span class='dh'>भुवनज्ञानं सूर्ये संयमात्</span><br>
<span class='r'>bhuvána-jñānám sū́ryē saṃyamā́t</span><br>

<h2>Перевод</h2>
Самьяма на солнце дает знание миров.<br>

<h2>Слова</h2>

<span class='d'>सूर्य</span><br>
<span class='r'>sū́ryē</span><br>
существительное — солнце.<br>
