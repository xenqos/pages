<h1>4.19&ensp;Ум не самосветимость</h1>

<span class='dh'>न तत्स्वाभासं दृश्यत्वात्</span><br>
<span class='r'>ná tát-svābhāsáṃ dṛśyátvāt</span><br>
<!-- ## Перевод -->
Оно (сознание) не самосветящееся, так как является объектом восприятия.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>स्वाभासम्</span><br>
<span class='r'>svābhāsáṃ</span><br>
прилагательное — самосветящееся.<br>
<br>
<span class='d'>दृश्यत्वात्</span><br>
<span class='r'>dṛśyátvāt</span><br>
отложительный падеж — из-за того, что видимо (является объектом).<br>
