<h1>3.20 Ограничение чтения</h1>

<span class='dh'>न च तत्सालम्बनं तस्याविषयीभूतत्वात्</span><br>
<span class='r'>ná cá tát-sālambanáṃ tásyāvíṣayībhūtatvā́t</span><br>
<!-- ## Перевод -->
Но не знание объектов этих мыслей, так как они не являются предметом самьямы йогина.<br>

<hr class='clHr'>

<span class='r'>sālambanáṃ</span><br>
