<h1>4.13 Сущность Гун</h1>

<span class='dh'>ते व्यक्तसूक्ष्मा गुणात्मानः</span><br>
<span class='r'>tḗ vyaktá-sūkṣmā́ guṇātmā́naḥ</span><br>
<!-- ## Перевод -->
Они, проявленные или тонкие, имеют природу гун.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>व्यक्त</span><br>
<span class='r'>vyaktá</span><br>
прилагательное — проявленный.<br>
<br>
<span class='d'>सूक्ष्म</span><br>
<span class='r'>sūkṣmā́</span><br>
прилагательное — тонкий.<br>
