<h1>3.15 Причина различий</h1>

<span class='dh'>क्रमान्यत्वं परिणामान्यत्वे हेतुः</span><br>
<span class='r'>kramānyatváṃ pariṇā́mānyatvē hētúḥ</span><br>
<!-- ## Перевод -->
Различие в последовательности является причиной различия трансформаций.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>क्रम</span><br>
<span class='r'>kráma</span><br>
существительное — последовательность, порядок.<br>
<br>
<span class='d'>अन्यत्वम्</span><br>
<span class='r'>anyatváṃ</span><br>
существительное — отличие, инаковость.<br>
