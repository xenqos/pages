<h1>2.53&ensp;Готовность к концентрации</h1>

<span class='dh'>धारणासु च योग्यता मनसः</span><br>
<span class='r'>dhāraṇāsu ca yōgyatā́ mánasaḥ</span><br>
<!-- ## Перевод -->
И ум обретает способность к концентрации.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>धारणासु</span><br>
<span class='r'>dhāraṇāsu</span><br>
в концентрациях.<br>
<br>
<span class='d'>मनसः</span><br>
<span class='r'>mánasaḥ</span><br>
ума.<br>

<hr class='clHr'>

<!-- ## Комментарий -->
И ум становится пригодным для дхараны (концентрации).<br>
