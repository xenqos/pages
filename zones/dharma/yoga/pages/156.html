<h1>3.50 Семя освобождения</h1>

<span class='dh'>तद्वैराग्यादपि दोषबीजक्षये कैवल्यम्</span><br>
<span class='r'>tad-vairāgyād-api dōṣá-bīja-kṣayē kaivályam</span><br>

<h2>Перевод</h2>
При беспристрастии даже к этому, когда семя порока уничтожено, наступает освобождение.<br>

<h2>Слова</h2>

<span class='d'>कैवल्यम्</span><br>
<span class='r'>kaivályam</span><br>
существительное — абсолютная свобода, освобождение.<br>
