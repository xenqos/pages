<h1>4.20 Ограниченность ума</h1>

<span class='dh'>एकसमये चोभयानवधारणम्</span><br>
<span class='r'>ēká-samayē cōbháyānavadhāráṇam</span><br>

<h2>Перевод</h2>
И невозможно одновременное осознание самого себя и объекта.<br>

<h2>Слова</h2>

<span class='d'>उभय</span><br>
<span class='r'>ubháyā</span><br>
местоимение — оба.<br>
<br>
<span class='d'>अनवधारणम्</span><br>
<span class='r'>anavadhāráṇam</span><br>
существительное — отсутствие постижения.<br>
