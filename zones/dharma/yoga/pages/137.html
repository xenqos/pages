<h1>3.31 Неподвижность (Горло)</h1>

<span class='dh'>कूर्मनाड्यां स्थैर्यम्</span><br>
<span class='r'>kūrmá-nāḍyā́ṃ stháiryám</span><br>

<h2>Перевод</h2>
На «черепашьем канале» — неподвижность.<br>

<h2>Слова</h2>

<span class='d'>स्थैर्यम्</span><br>
<span class='r'>stháiryám</span><br>
существительное — устойчивость, стабильность.<br>
