<h1>4.32 Завершение Гун</h1>

<span class='dh'>ततः कृतार्थानां परिणामक्रमसमाप्तिर्गुणाणाम्</span><br>
<span class='r'>tátáḥ kr̥tā́rthānāṃ pariṇā́ma-kráma-samā́ptir-guṇā́nām</span><br>

<h2>Перевод</h2>
Вслед за этим завершается последовательность трансформаций гун, выполнивших свою цель.<br>

<h2>Слова</h2>

<span class='d'>समाप्तिः</span><br>
<span class='r'>samā́ptir</span><br>
существительное — завершение, конец.<br>
