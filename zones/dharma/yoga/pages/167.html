<h1>4.6 Ум без отпечатков</h1>

<span class='dh'>तत्र ध्यानजमनाशयम्</span><br>
<span class='r'>tátra dhyānajám-anāśayám</span><br>
<!-- ## Перевод -->
Среди них то сознание, которое рождено медитацией, свободно от кармических отпечатков.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>ध्यानजम्</span><br>
<span class='r'>dhyānajám</span><br>
прилагательное — рожденное из медитации.<br>
<br>
<span class='d'>अनाशयम्</span><br>
<span class='r'>anāśayám</span><br>
прилагательное — лишенное хранилища (кармы).<br>
