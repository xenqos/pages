<h1>3.55 Равенство чистоты</h1>

<span class='dh'>सत्त्वपुरुषयोः शुद्धिसाम्ये कैवल्यमिति</span><br>
<span class='r'>sattvá-puruṣayōḥ śúddhi-sāmyē kaivályam-ití</span><br>

<h2>Перевод</h2>
Когда чистота интеллекта становится равной чистоте Пуруши, наступает освобождение.<br>

<h2>Слова</h2>

<span class='d'>साम्ये</span><br>
<span class='r'>sāmyē</span><br>
местный падеж — в равенстве, в подобии.<br>
