<h1>4.23 Ум как посредник</h1>

<span class='dh'>द्रष्टृदृश्योपरक्तं चित्तं सर्वार्थम्</span><br>
<span class='r'>dráṣṭṛ-dr̥śyōpáraktaṃ cittáṃ sarvā́rtham</span><br>
<!-- ## Перевод -->
Сознание, окрашенное Зрителем и Зримым, способно постичь всё.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>उपरक्तम्</span><br>
<span class='r'>upáraktaṃ</span><br>
причастие — окрашенное.<br>
<br>
<span class='d'>सर्वार्थम्</span><br>
<span class='r'>sarvā́rtham</span><br>
прилагательное — всеохватывающее.<br>
