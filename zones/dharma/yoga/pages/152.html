<h1>3.46&ensp;Совершенство тела</h1>

<span class='dh'>रूपलावण्यबलवज्रसंहननत्वानि कायसम्पत्</span><br>
<span class='r'>rūpá-lāvaṇyá-balá-vajrásaṃhananatvā́ni kāyá-sampát</span><br>
<!-- ## Перевод -->
Совершенство тела включает в себя красоту, грацию, силу и твердость алмаза.<br>

<hr class='clHr'>

<span class='d'>लावण्य</span><br>
