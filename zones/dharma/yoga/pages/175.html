<h1>4.14&ensp;Единство объекта</h1>

<span class='dh'>परिणामैकत्वाद्वस्तुतत्त्वम्</span><br>
<span class='r'>pariṇā́māikátvād-vástu-tattvám</span><br>
<!-- ## Перевод -->
Сущность объекта едина благодаря единству трансформации гун.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>वस्तु</span><br>
<span class='r'>vástu</span><br>
существительное — вещь, объект.<br>
<br>
<span class='d'>तत्त्वम्</span><br>
<span class='r'>tattvám</span><br>
существительное — истинность, сущность.<br>
