<h1>2.24 Неведение как причина</h1>

<span class='dh'>तस्य हेतुर्अविद्या</span><br>
<span class='r'>tásya hētúr-avidyā́</span><br>
<!-- ## Перевод -->
Его (этого соединения) причиной является неведение.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>तस्य</span><br>
<span class='r'>tásya</span><br>
местоимение — его.<br>
<br>
<span class='d'>हेतुः</span><br>
<span class='r'>hētúr</span><br>
существительное — причина.<br>
<br>
<span class='d'>अविद्या</span><br>
<span class='r'>avidyā́</span><br>
существительное — неведение.<br>
