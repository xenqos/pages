<h1>3.47 Власть над чувствами</h1>

<span class='dh'>ग्रहणस्वरूपास्मितान्वयार्थवत्त्वसंयमादिन्द्रियजयः</span><br>
<span class='r'>grahaṇá-svarūpāsmitānvayārthavattvá-saṃyamād-indriyá-jayáḥ</span><br>
<!-- ## Перевод -->
Самьяма на процессе восприятия, собственной форме, эгоизме, связи и цели дает власть над чувствами.<br>

<hr class='clHr'>

<!-- ## Слова -->
<span class='d'>इन्द्रिय</span><br>
<span class='r'>indriyá</span><br>
существительное — орган чувств.<br>
