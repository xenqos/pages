<h1>4.28 Устранение примесей</h1>

<span class='dh'>हानमेषां क्लेशवदुक्तम्</span><br>
<span class='r'>hā́nám-ēṣāṃ klēśavád-uktám</span><br>

<h2>Перевод</h2>
Их устранение подобно устранению страданий (клеш), как было сказано ранее.<br>

<h2>Слова</h2>

<span class='d'>हानम्</span><br>
<span class='r'>hā́nám</span><br>
существительное — устранение, прекращение.<br>
<br>
<span class='d'>उक्तम्</span><br>
<span class='r'>uktám</span><br>
причастие — сказанное.<br>
