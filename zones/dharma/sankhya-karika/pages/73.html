<h1>Карика 73. Завершение трактата</h1>

<span class='t1'>तस्मात्समाप्तमिदं शास्त्रम् ।</span><br>
<span class='t1'>॥ श्री साङ्ख्यकारिका समाप्ता ॥</span><br>
<br>
<span class='t2'>tasmāt samāptam idaṃ śāstram |</span><br>
<span class='t2'><p class='r'> śrī sāṅkhyakārikā samāptā ||</span></p><p class='y'></p>
<span class='t3'>Так заканчивается это наставление.</span><br>
<span class='t3'>Священная Санкхья-карика завершена.</span><br>
