<h6>Самхиты</h6>

    brahmaṇaspáti sū́kta (RV 10.72) — Гимн о рождении богов.<br>
    Упоминает, что сущее произошло из не-сущего, и описывает Брахманаспати как того, кто «выковал» этот мир.<br>
<br>
    brahmaṇaspáti sū́kta (10.72) — Процесс «выковывания» бытия из небытия.<br>
