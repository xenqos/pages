<h6>Самхиты</h6>

    asyá vāmīyá sū́kta (RV 1.164) — Гимн-загадка Риши Диргхатамаса.<br>
    Сложный текст о единстве сущего («Единое мудрецы называют по-разному») и круговороте времени.<br>
<br>
    asyá vāmīyá sū́kta (1.164) — Итог: Гимн-загадка, призывающий осознать, что всё вышеперечисленное — это грани Одного.<br>
